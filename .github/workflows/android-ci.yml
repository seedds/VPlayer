name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Configure Android SDK path
        run: printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > android/local.properties

      - name: Prepare release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/vplayer-release.keystore"
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease
        working-directory: android
        env:
          VPLAYER_RELEASE_STORE_FILE: ${{ runner.temp }}/vplayer-release.keystore
          VPLAYER_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          VPLAYER_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          VPLAYER_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: vplayer-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
