name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Compute release metadata
        id: release_meta
        run: |
          app_version=$(node -p "require('./app.json').expo.version")
          build_number="${GITHUB_RUN_NUMBER}"
          release_tag="v${app_version}-build.${build_number}"
          apk_name="vplayer-${app_version}-${build_number}.apk"
          {
            echo "app_version=${app_version}"
            echo "build_number=${build_number}"
            echo "release_tag=${release_tag}"
            echo "apk_name=${apk_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Android SDK path
        run: printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > android/local.properties

      - name: Prepare release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/vplayer-release.keystore"
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease -PreactNativeArchitectures=arm64-v8a
        working-directory: android
        env:
          NODE_ENV: production
          VPLAYER_RELEASE_STORE_FILE: ${{ runner.temp }}/vplayer-release.keystore
          VPLAYER_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          VPLAYER_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          VPLAYER_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          VPLAYER_VERSION_NAME: ${{ steps.release_meta.outputs.app_version }}
          VPLAYER_VERSION_CODE: ${{ steps.release_meta.outputs.build_number }}

      - name: Generate release notes
        id: release_notes
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          previous_tag=""
          while IFS= read -r tag; do
            if [ "$tag" != "$RELEASE_TAG" ]; then
              previous_tag="$tag"
              break
            fi
          done <<EOF
          $(git for-each-ref refs/tags --sort=-creatordate --format='%(refname:short)')
          EOF

          notes_file="$RUNNER_TEMP/release-notes.md"
          commits_file="$RUNNER_TEMP/release-commits.txt"

          if [ -n "$previous_tag" ]; then
            git rev-list --reverse "${previous_tag}..HEAD" > "$commits_file"
          else
            git rev-list --reverse HEAD > "$commits_file"
          fi

          {
            printf '## Changelog\n\n'
            if [ -n "$previous_tag" ]; then
              printf 'Changes since `%s`.\n\n' "$previous_tag"
            else
              printf 'Changes included in this release.\n\n'
            fi

            if [ ! -s "$commits_file" ]; then
              printf '%s\n' 'Rebuilt release artifacts for this commit.'
            else
              while IFS= read -r commit; do
                short_commit=$(git rev-parse --short "$commit")
                subject=$(git log -1 --format=%s "$commit")
                body=$(git log -1 --format=%b "$commit")

                printf '### `%s` %s\n\n' "$short_commit" "$subject"

                if [ -n "$body" ]; then
                  printf '%s\n\n' "$body"
                fi
              done < "$commits_file"
            fi
          } > "$notes_file"

          echo "notes_path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.release_notes.outputs.notes_path }}
          files: android/app/build/outputs/apk/release/${{ steps.release_meta.outputs.apk_name }}
          make_latest: true
          overwrite_files: true
          name: VPlayer ${{ steps.release_meta.outputs.app_version }} (${{ steps.release_meta.outputs.build_number }})
